<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>G3W War Dashboard</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 14px; background:
      radial-gradient(circle at 50% 18%, rgba(46,74,120,0.20) 0%, rgba(46,74,120,0.00) 34%),
      radial-gradient(circle at top, #17212d 0%, #0f141b 40%, #0c1117 100%);
      color: #e7e7e7; position: relative; overflow-x: hidden; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; pointer-events: none; background: url('/static/icons/g3wlogo.png') center 54% / min(92vw, 980px) auto no-repeat; opacity: 0.16; filter: saturate(0.95) brightness(0.95) blur(0.2px); z-index: 0; }
    body::after { content: ''; position: fixed; inset: 0; pointer-events: none; background:
      linear-gradient(180deg, rgba(8,12,18,0.06), rgba(8,12,18,0.18) 35%, rgba(8,12,18,0.30) 100%),
      radial-gradient(circle at center, rgba(255,255,255,0.02), rgba(12,17,23,0.08) 42%, rgba(12,17,23,0.16) 100%); z-index: 0; }
    body > * { position: relative; z-index: 1; }
    h1 { margin: 0 0 10px; font-size: 20px; }
    .muted { color: #a8b0bd; }
    .card { position: relative; overflow: hidden; background: linear-gradient(180deg, rgba(18, 26, 36, 0.34), rgba(9, 14, 21, 0.22)); border: 1px solid rgba(112, 132, 166, 0.18); border-radius: 22px; padding: 14px; margin: 12px 0 18px; box-shadow: 0 18px 40px rgba(0,0,0,0.10); backdrop-filter: blur(8px) saturate(112%); -webkit-backdrop-filter: blur(8px) saturate(112%); }
    .card > * { position: relative; z-index: 1; }
    .table-wrap { overflow: auto; margin-top: 10px; border-radius: 16px; background: linear-gradient(180deg, rgba(8, 12, 18, 0.02), rgba(8, 12, 18, 0.00)); box-shadow: inset 0 0 0 1px rgba(120,140,170,0.03); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    select, input { background: #0f1115; color: #e7e7e7; border: 1px solid #2a3443; border-radius: 8px; padding: 6px 8px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid rgba(88, 104, 132, 0.24); padding: 9px 8px; vertical-align: top; background: transparent; }
    th { text-align: left; color: #d5deec; font-weight: 600; background: rgba(255,255,255,0.010); text-shadow: 0 1px 0 rgba(0,0,0,0.28); }
    tr:hover td { background: rgba(255,255,255,0.035); }
    /* Wyraźniejsze Zwycięstwo / Porażka (delikatne tło całego wiersza) */
    tr.row-win td { background: rgba(46, 204, 113, 0.045); }
    tr.row-loss td { background: rgba(231, 76, 60, 0.045); }
    tr.row-win:hover td { background: rgba(46, 204, 113, 0.09); }
    tr.row-loss:hover td { background: rgba(231, 76, 60, 0.09); }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid #2a3443; font-size: 12px; }
    .ok { border-color: rgba(46, 204, 113, 0.6); }
    .bad { border-color: rgba(231, 76, 60, 0.6); }
    .warn { border-color: rgba(241, 196, 15, 0.7); }
    details > summary { cursor: pointer; }
    pre { background: #0f1115; border: 1px solid #2a3443; border-radius: 10px; padding: 10px; overflow: auto; }
    .small { font-size: 12px; }
    .right { text-align: right; }
    /* (legacy) button toggle styles kept for other places */
    .toggle { background: transparent; border: 1px solid #2a3443; color: #e7e7e7; border-radius: 8px; padding: 4px 8px; cursor: pointer; }
    .toggle:hover { background: rgba(255,255,255,0.03); }

    /* Wars list: click whole row */
    .war-row { cursor: pointer; }
    .war-row:hover td { background: rgba(255,255,255,0.02); }
    .upcoming-row td { background: rgba(255, 213, 79, 0.06) !important; }
    .upcoming-row:hover td { background: rgba(255, 213, 79, 0.08) !important; }
    .upcoming-row .pill { border-color: rgba(255, 213, 79, 0.35); }

    /* Mobile one-line summary for wars (Data + Wynik + Różnica + Przeciwnik + skrót trybu) */
    .war-line { display: none; align-items: center; gap: 10px; min-width: 0; }
    .war-line .w-date { flex: 0 0 auto; color: #e7e7e7; }
    .war-line .w-diff { flex: 0 0 auto; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .war-line .w-opp {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #c9d2e0;
      font-size: 12px;
    }
    .war-line .w-mode-short {
      flex: 0 0 auto;
      min-width: 32px;
      text-align: right;
      font-size: 12px;
      font-weight: 700;
      color: #d7deea;
      opacity: 0.95;
    }

    .w-mode-wrap { position: relative; display: inline-flex; align-items: center; }
    .mode-icon-btn { display: none; border: 0; background: transparent; padding: 0; margin-left: 6px; cursor: pointer; }
    .mode-icon-btn:active { transform: scale(0.98); }
    .mode-icon { width: 20px; height: 20px; border-radius: 50%; box-shadow: 0 0 0 1px #1c2533; }
    .mode-tooltip-portal { position: fixed; z-index: 9999; display: none; padding: 6px 8px; border-radius: 8px;
      background: rgba(15,17,21,0.98); border: 1px solid #273140; color: #e7e7e7; font-size: 12px; white-space: nowrap;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35); pointer-events: none; }
    .mode-tooltip-portal.show { display: block; }

    .w-date-only { display: inline; }

    /* Average table row toggle */
    .avg-row { cursor: pointer; }
    .avg-row:hover { background: rgba(255,255,255,0.025); }
    /* Podium dla TOP 3 w tabeli średnich */
    .avg-row.podium-1 td { background: rgba(255, 215, 0, 0.075); }
    .avg-row.podium-2 td { background: rgba(192, 192, 192, 0.075); }
    .avg-row.podium-3 td { background: rgba(205, 127, 50, 0.075); }
    .avg-row.podium-1:hover td { background: rgba(255, 215, 0, 0.14); }
    .avg-row.podium-2:hover td { background: rgba(192, 192, 192, 0.14); }
    .avg-row.podium-3:hover td { background: rgba(205, 127, 50, 0.14); }


    /* Szczegoly w tabeli srednich rozwijane sa kliknieciem w caly wiersz */
    .details-row td { background: rgba(255,255,255,0.010); }
    .btn { background: transparent; border: 1px solid #2a3443; color: #e7e7e7; border-radius: 8px; padding: 6px 10px; cursor: pointer; }
    .btn:hover { background: rgba(255,255,255,0.03); }

    /* Średnie graczy – rozwijane szczegóły */
    .player-name { font: inherit; color: #e7e7e7; }
    .details-row td { padding-top: 6px; padding-bottom: 10px; }
    .points-detail { padding-left: 18px; display: flex; flex-direction: column; gap: 8px; }
    .points-label { margin-right: 8px; }
    .points-chips { display: inline-flex; flex-wrap: wrap; gap: 6px; vertical-align: middle; }
    /* Points chips: unified look with rank chips */
    .pts-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #10151c;
      border: 1px solid #2a3442;
      color: #c9d2e0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }

    /* Min / max highlight in expanded points list */
    .pts-chip.pts-min {
      border-color: rgba(231, 76, 60, 0.55);
      background: rgba(231, 76, 60, 0.12);
      color: rgba(231, 76, 60, 0.98);
      font-weight: 700;
    }
    .pts-chip.pts-max {
      border-color: rgba(46, 204, 113, 0.55);
      background: rgba(46, 204, 113, 0.12);
      color: rgba(46, 204, 113, 0.98);
      font-weight: 700;
    }

    /* Wyniki przeliczone (wojny XvX gdzie X != 30): gwiazdka + inne podświetlenie */
    .pts-chip.pts-scaled {
      border-style: dashed;
      border-color: rgba(120, 168, 255, 0.55);
      background: rgba(120, 168, 255, 0.10);
      color: rgba(205, 225, 255, 0.98);
      cursor: pointer;
    }
    .pts-chip-wrap {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }
    .pts-chip .chip-mode-icon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 auto;
      box-shadow: 0 0 0 1px rgba(17, 24, 39, 0.65);
    }
    .pts-chip .chip-value {
      line-height: 1;
    }
    .pts-chip .chip-avg-ind {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      min-width: 12px;
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      opacity: 0.95;
    }
    .pts-chip .chip-rank-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 32px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(7, 10, 15, 0.42);
      border: 1px solid rgba(255,255,255,0.12);
      color: #d8dfeb;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .01em;
      margin-left: 2px;
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .pts-chip .chip-podium {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      opacity: 0.92;
      transform: translateY(-0.5px);
    }
    .pts-chip.pts-above-avg {
      box-shadow: inset 0 0 0 1px rgba(46, 204, 113, 0.18);
      border-color: rgba(46, 204, 113, 0.60);
    }
    .pts-chip.pts-below-avg {
      box-shadow: inset 0 0 0 1px rgba(231, 76, 60, 0.16);
      border-color: rgba(231, 76, 60, 0.56);
    }
    .pts-chip.pts-near-avg {
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.14);
      border-color: rgba(148, 163, 184, 0.52);
    }

    /* Mała notka (popover) po kliknięciu przeliczonego wyniku */
    .chip-note {
      position: fixed;
      z-index: 9999;
      max-width: min(520px, calc(100vw - 24px));
      background: rgba(12, 16, 22, 0.96);
      border: 1px solid rgba(120, 168, 255, 0.35);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      color: #e7eefc;
      font-size: 13px;
      line-height: 1.35;
      display: none;
    }

    /* Zmiana pozycji w rankingu średniej (wpływ ostatniej wojny) */
    .rank-up { color: rgba(46, 204, 113, 0.95); font-weight: 700; }
    .rank-down { color: rgba(231, 76, 60, 0.95); font-weight: 700; }
    .rank-same { color: #a8b0bd; }

    /* Licznik W-D-L przy nagłówku "Wojny" */
    .count-win { color: rgba(46, 204, 113, 0.95); font-weight: 700; }
    .count-draw { color: #a8b0bd; font-weight: 700; }
    .count-loss { color: rgba(231, 76, 60, 0.95); font-weight: 700; }

    /* Wojny: ładniejszy widok listy graczy w szczegółach */
    .war-details { display: grid; gap: 10px; width: 100%; max-width: 100%; box-sizing: border-box; text-align: left; }
    .war-details * { box-sizing: border-box; }
    .war-details-header { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .war-meta { display: inline-flex; gap: 6px; align-items: center; }
    .war-meta code { background: rgba(255,255,255,0.03); border: 1px solid #2a3443; padding: 1px 6px; border-radius: 999px; }
    .players-wrap { overflow: auto; }
    .players-table { width: 100%; border-collapse: collapse; border: 1px solid #222a35; border-radius: 10px; overflow: hidden; }
    .players-table th, .players-table td { padding: 8px 10px; border-bottom: 1px solid #222a35; }
    .players-table th { background: rgba(255,255,255,0.02); color: #c9d2e0; font-weight: 650; }
    .players-table tr:hover td { background: rgba(255,255,255,0.04); }
    /* Podświetlenie wierszy ze statusem (UNKNOWN / poza rosterem) */
    .players-table tr.row-unknown td { background: rgba(241, 196, 15, 0.06); }
    .players-table tr.row-oor td { background: rgba(241, 196, 15, 0.04); }
    .players-table tr.row-unknown:hover td { background: rgba(241, 196, 15, 0.09); }
    .players-table tr.row-oor:hover td { background: rgba(241, 196, 15, 0.06); }

    /* Mobile players list for war details */
    .players-mobile { display: none; }
    .players-mobile .player-line {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 56px 52px;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid rgba(44,58,76,0.8);
      border-radius: 10px;
      background: rgba(8,14,22,0.32);
      min-height: 42px;
    }
    .players-mobile .player-line.row-unknown { background: rgba(241, 196, 15, 0.06); }
    .players-mobile .player-line.row-oor { background: rgba(241, 196, 15, 0.04); }
    .players-mobile .player-line.above-avg { background: rgba(46, 204, 113, 0.05); border-color: rgba(46, 204, 113, 0.22); }
    .players-mobile .player-line.below-avg { background: rgba(231, 76, 60, 0.04); border-color: rgba(231, 76, 60, 0.18); }
    .players-mobile .rank-badge { flex: 0 0 auto; min-width: 30px; text-align: center; }
    .players-mobile .pname { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 15px; }
    .players-mobile .pts { min-width: 0; text-align: right; font-size: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .players-mobile .pstatus { min-width: 0; text-align: right; white-space: nowrap; display: flex; justify-content: flex-end; }
    .rank-badge {
      display: inline-flex;
      min-width: 26px;
      justify-content: center;
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid #2a3443;
      background: rgba(255,255,255,0.02);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: #d7deea;
    }
    .pts {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      color: #e7e7e7;
    }
    .status-cell { white-space: nowrap; }
    .status-pill { margin-left: 6px; }
    .avg-separator td,
    .players-mobile .avg-separator {
      padding: 6px 0 4px;
      background: transparent !important;
      border: 0 !important;
    }
    .avg-separator-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #9fb0c7;
      font-size: 11px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .avg-separator-line::before,
    .avg-separator-line::after {
      content: '';
      flex: 1 1 auto;
      border-top: 1px dashed rgba(159,176,199,0.38);
    }
    .avg-separator-line strong { color: #d6e2f1; font-weight: 700; text-transform: none; letter-spacing: 0; }
    .players-table tr.above-avg td { background: rgba(46, 204, 113, 0.04); }
    .players-table tr.below-avg td { background: rgba(231, 76, 60, 0.03); }
    .players-table tr.above-avg:hover td { background: rgba(46, 204, 113, 0.06); }
    .players-table tr.below-avg:hover td { background: rgba(231, 76, 60, 0.05); }

    /* Wojny: przycisk Pokaż więcej/mniej */
    .wars-toggle-wrap { margin-top: 10px; display: flex; justify-content: flex-start; }

    .site-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      margin: 0 0 14px;
      background: linear-gradient(180deg, rgba(22, 28, 37, 0.56), rgba(16, 21, 28, 0.48));
      border: 1px solid rgba(78, 93, 116, 0.34);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
      overflow: hidden;
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
    }
    .site-header::after {
      content: '';
      position: absolute;
      inset: auto 14px 0 14px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 196, 71, 0.45), rgba(79, 175, 255, 0.35), transparent);
    }
    .site-header-logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.28));
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
    }
    .site-header-copy { min-width: 0; }
    .site-header-title { margin: 0; font-size: clamp(22px, 4.4vw, 30px); line-height: 1.05; letter-spacing: 0.01em; text-shadow: 0 6px 18px rgba(0,0,0,0.25); }


    /* Nagłówek: bilans W-R-P */
    .wins { color: rgba(46, 204, 113, 0.95); font-weight: 700; }
    .draws { color: #a8b0bd; font-weight: 700; }
    .losses { color: rgba(231, 76, 60, 0.95); font-weight: 700; }

    /* Mobile: brak przewijania lewo-prawo (wojny jako karty + szczegóły full-width) */
    @media (max-width: 640px) {
      body { padding: 10px; margin: 10px; }
      body::before { background-size: min(126vw, 900px); opacity: 0.22; background-position: center 44%; }
      body::after { background:
        linear-gradient(180deg, rgba(8,12,18,0.03), rgba(8,12,18,0.10) 35%, rgba(8,12,18,0.16) 100%),
        radial-gradient(circle at center, rgba(255,255,255,0.015), rgba(12,17,23,0.04) 42%, rgba(12,17,23,0.08) 100%); }
      .card { background: linear-gradient(180deg, rgba(18,26,36,0.20), rgba(9,14,21,0.11)); border-radius: 18px; padding: 10px; }
      .table-wrap { background: linear-gradient(180deg, rgba(8,12,18,0.01), rgba(8,12,18,0)); }
      .site-header { border-radius: 18px; padding: 10px 12px; background: linear-gradient(180deg, rgba(18,26,36,0.24), rgba(9,14,21,0.14)); }
      .site-header-logo { width: 38px; height: 38px; }

      /* Na mobile nie przewijamy poziomo kontenera tabel */
      .table-wrap { overflow: visible; }

      /* Wars list on mobile: one-line summary (no horizontal scroll) */
      #warsTable thead { display: none; }
      #warsTable, #warsTable tbody, #warsTable tr { display: block; width: 100%; }
      #warsTable tr.war-row { border: 1px solid #222a35; border-radius: 10px; margin: 10px 0; overflow: hidden; }
      /* show only the first cell with a compact one-line summary */
      #warsTable tr.war-row td { display: none; border: 0; padding: 10px 12px; }
      #warsTable tr.war-row td:first-child { display: block; }
      #warsTable td::before { content: ''; }
      .war-line { display: flex; }

      /* On mobile show mode icon instead of abbreviation */
      .w-mode-short { display: none; }
      .mode-icon-btn { display: inline-flex; }
      .w-date-only { display: none; }

      /* Wiersz szczegółów jako blok pod kartą */
      #warsTable tr.details-row { display: block; margin: -6px 0 14px; }
      #warsTable tr.details-row td { display: block; padding: 8px 0 0; border: 0; }
      #warsTable tr.details-row td::before { content: ''; }

      .war-details-header { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: start; }
      .war-details-header .war-meta { grid-column: 1 / -1; }
      .war-details-header .pill { font-size: 11px; padding: 2px 7px; }
      .players-wrap { overflow: visible; }

      /* War details players list on mobile uses div-based layout (no table hacks for Safari) */
      .players-table { display: none; }
      .players-mobile { display: flex; flex-direction: column; gap: 6px; }
      .players-mobile .player-line { grid-template-columns: 38px minmax(0, 1fr) 48px 42px; padding: 6px 8px; min-height: 38px; border-radius: 9px; }
      .players-mobile .pname { font-size: 14px; }
      .players-mobile .pts { font-size: 13px; }
      .players-mobile .pstatus .pill { font-size: 10px; padding: 2px 6px; }
      .players-mobile .rank-badge { min-width: 26px; padding: 1px 5px; font-size: 11px; }
    }
  
    .mode-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      max-width: 280px;
    }
    .mode-icon-inline {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid #2a3442;
      background: #0f1115;
      flex: 0 0 auto;
    }
    .mode-name {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
      display: inline-block;
      vertical-align: middle;
    }
    .excl {
      display: inline-block;
      margin-right: 6px;
      color: #ff5c5c;
      font-weight: 800;
    }

    /* Stopka */
    footer.site-footer {
      margin-top: 18px;
      padding: 14px 4px 6px;
      border-top: 1px solid #222a35;
      color: #a8b0bd;
      font-size: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    footer.site-footer .footer-left { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    footer.site-footer a { color: #c9d2e0; text-decoration: none; border-bottom: 1px solid rgba(201,210,224,0.25); }
    footer.site-footer a:hover { border-bottom-color: rgba(201,210,224,0.6); }


    /* Filters layout */
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-top: 10px;
      align-items: end;
    }
    .filter-item { display: flex; flex-direction: column; gap: 6px; }
    .filter-label { font-size: 12px; color: var(--muted); }
    @media (max-width: 700px) {
      .filters { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
    @media (max-width: 420px) {
      .filters { grid-template-columns: 1fr; }
    }


    /* Avg table: keep readable on mobile */
    @media (max-width: 640px) {
      body { padding: 10px; }
      body::before { background-size: min(92vw, 620px); opacity: 0.095; background-position: center 46%; }
      .card { background: linear-gradient(180deg, rgba(18,26,36,0.34), rgba(9,14,21,0.24)); border-radius: 18px; }
      .site-header { border-radius: 18px; padding: 10px 12px; }
      .site-header-logo { width: 38px; height: 38px; }

      #rosterTable .col-forma,
      #rosterTable .col-wahanie { display: none; }
    }


    @media (max-width: 720px) {
      body { margin: 12px; }
      body::before { background-size: min(118vw, 760px); background-position: center 45%; opacity: 0.18; }
      .site-header { gap: 10px; padding: 10px 12px; border-radius: 14px; background: linear-gradient(180deg, rgba(18,26,36,0.24), rgba(9,14,21,0.14)); }
      .site-header-logo { width: 44px; height: 44px; }
    }

  </style>
</head>

<body>
  <header class="site-header" aria-label="Nagłówek strony">
    <img class="site-header-logo" src="/static/icons/g3wlogo.png" alt="Logo G3W" />
    <div class="site-header-copy">
      <h1 class="site-header-title">G3W War Dashboard</h1>
    </div>
  </header>


  <div class="card">
    <div class="row">
      <div><b>Średnia graczy</b></div>
      <div class="muted">z ostatnich</div>
      <select id="avgX"></select>
      <div class="muted">wojen</div>
      <label style="display:inline-flex; align-items:center; gap:6px; margin-left:10px;" title="Gdy zaznaczone: wyniki z wojen XvX (X≠30) są przeliczane wg (punkty * X)/30 i oznaczane gwiazdką. Gdy odznaczone: pokazujemy wyniki surowe.">
        <input type="checkbox" id="toggleScaledPoints" checked />
        <span class="muted">Punkty przeliczone</span>

    <div class="table-wrap">

            <th class="right col-forma" title="Forma: (średnia z nowszej połowy okna) − (średnia ze starszej połowy okna). Jednostka: pkt/wojnę.">Forma</th>
            <th class="right col-wahanie" title="Wahanie: (max − min) z ostatnich X wojen. Jednostka: pkt.">Wahanie</th>

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <div><b>Wojny</b> <span class="muted" id="warsSummary" title="Bilans: zwycięstwa–remisy–porażki"></span></div>
      <div class="muted" id="warsCount">Ładowanie…</div>
    </div>

    
    <div class="filters">
      <div class="filter-item">
        <div class="filter-label">Wynik</div>
        <select id="filterResult">
          <option value="">Wszystkie</option>
          <option value="Zwycięstwo">Zwycięstwo</option>
          <option value="Porażka">Porażka</option>
        </select>
      </div>

      <div class="filter-item">
        <div class="filter-label">Tryb</div>

          <option value="">Wszystkie</option>

      </div>

      <div class="filter-item">
        <div class="filter-label">Przeciwnik</div>
        <select id="filterOpponent">
          <option value="">Wszyscy</option>
        </select>
      </div>

      <div class="filter-item">
        <div class="filter-label">Sortowanie</div>
        <select id="sortBy">
          <option value="date_desc">Data (najnowsze)</option>
          <option value="result">Wynik (Zwycięstwa na górze)</option>
          <option value="mode">Tryb (A→Z)</option>
          <option value="diff_desc">Różnica (malejąco)</option>

    <div class="table-wrap wars-wrap">

      <table id="warsTable">
        <thead>
          <tr>
            <th>Data</th>
            <th>Wynik</th>
            <th class="right">Różnica</th>
            <th>Przeciwnik</th>
            <th>Tryb</th>

        <tbody></tbody>
      </table>

    <div class="wars-toggle-wrap">
      <button id="warsToggleBtn" class="btn" style="display:none;">Pokaż więcej</button>
    </div>
  </div>

  

  <footer class="site-footer" aria-label="Stopka">
    <div class="footer-left">
      <span>© 2026 Developed by Michi for G3W</span>
      <span class="muted">•</span>
      <span id="footerVersion" class="muted"></span>
      <span class="muted">•</span>
      <span id="footerBuild" class="muted"></span>
    </div>
    <div>
      <a href="/static/release-notes.html" target="_blank" rel="noopener">Release notes</a>
    </div>
  </footer>

<script>
  // Footer metadata (fetched from backend so it stays accurate after deploys)
  async function loadFooterMeta() {
    try {
      const r = await fetch('/api/meta', { cache: 'no-store' });
      if (!r.ok) throw new Error('meta http ' + r.status);
      const m = await r.json();
      document.getElementById('footerVersion').textContent = m.version || '';
      document.getElementById('footerBuild').textContent = m.build || '';
    } catch (e) {
      // Fallback: avoid empty footer even if API is not available.
      document.getElementById('footerVersion').textContent = '';
      document.getElementById('footerBuild').textContent = '';
    }
  }
  loadFooterMeta();

  // UI preference: show scaled points for wars XvX (X != 30) or raw points.
  const LS_USE_SCALED = 'epwar_use_scaled_points_v1';
  const getUseScaledPoints = () => {
    const cb = document.getElementById('toggleScaledPoints');
    if (cb) return !!cb.checked;
    const v = localStorage.getItem(LS_USE_SCALED);
    if (v === null) return true;
    return v === '1';
  };
  const setUseScaledPoints = (v) => {
    try { localStorage.setItem(LS_USE_SCALED, v ? '1' : '0'); } catch (_) {}
    const cb = document.getElementById('toggleScaledPoints');
    if (cb) cb.checked = !!v;
  };

  const fmtDate = (ts) => {
    try {
      const d = new Date(ts * 1000);
      // Only date (no time) for the "Data" column.
      return d.toLocaleDateString('pl-PL', { year: 'numeric', month: '2-digit', day: '2-digit' });
    } catch (e) { return String(ts); }
  };

  function escapeHtml(s) {
    return String(s)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#39;');
  }

  function abbrMode(mode) {
    const m = String(mode || '').trim();
    if (!m || m === '-') return '-';
    const up = m.toUpperCase();
    const map = {
      'LEPSZY ATAK': 'LA',
      'SZTURM': 'SZ',
      'ŻAR Z NIEBA': 'ZZN',
      'ZAR Z NIEBA': 'ZZN',
      'KRWAWA WOJNA': 'KW',
    };
    if (map[up]) return map[up];

    // Fallback: take first letters of words (including short ones like "Z").
    const parts = up.split(/\s+/).filter(Boolean);
    const ab = parts.map(p => p[0]).join('');
    return ab.slice(0, 4);
  }


  function normalizeModeKey(s) {
    return String(s || '')
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/\p{Diacritic}/gu, '')
      .replace(/\s+/g, ' ');
  }

  const MODE_ICON_MAP = (() => {
    // Keys are normalized (lowercase, no diacritics)
    const m = new Map();
    m.set(normalizeModeKey('Grad strzał'), 'icon_final_3.png');
    m.set(normalizeModeKey('Horda nieumarłych'), 'icon_final_1.png');
    m.set(normalizeModeKey('Krwawa wojna'), 'icon_final_2.png');
    m.set(normalizeModeKey('Lepszy atak'), 'icon_final_6.png');
    m.set(normalizeModeKey('Starożytny upiór'), 'icon_final_4.png');
    m.set(normalizeModeKey('Szturm'), 'icon_final_7.png');
    m.set(normalizeModeKey('Wojenne wyrównanie'), 'icon_final_8.png');
    m.set(normalizeModeKey('Żar z nieba'), 'icon_final_9.png');
    m.set(normalizeModeKey('Pole koniczyny'), 'icon_final_5.png');
    return m;
  })();

  function getModeIconSrc(modeFull) {
    const key = normalizeModeKey(modeFull);
    const file = MODE_ICON_MAP.get(key);
    const placeholder = "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2232%22 ry=%2232%22 fill=%22%231c2533%22/%3E%3Ctext x=%2232%22 y=%2242%22 font-size=%2234%22 text-anchor=%22middle%22 fill=%22%23e7e7e7%22 font-family=%22Arial%22%3E%3F%3C/text%3E%3C/svg%3E";
    return file ? `/static/icons/${file}` : placeholder;
  }

  function getWarAverageForPlayers(players, useScaled) {
    const vals = (Array.isArray(players) ? players : [])
      .map((p) => useScaled
        ? ((p.points_scaled_value !== undefined) ? Number(p.points_scaled_value) : Number((p.points !== undefined) ? p.points : p.points_raw || 0))
        : Number((p.points_raw !== undefined) ? p.points_raw : p.points || 0))
      .filter((v) => Number.isFinite(v));
    if (!vals.length) return null;
    return vals.reduce((a, b) => a + b, 0) / vals.length;
  }

  function getAverageRelationInfo(value, avg) {
    if (!Number.isFinite(Number(value)) || !Number.isFinite(Number(avg))) {
      return { cls: '', symbol: '', label: 'Brak porównania', diff: null };
    }
    const diff = Number(value) - Number(avg);
    const threshold = Math.max(0.5, Math.abs(Number(avg)) * 0.015);
    if (Math.abs(diff) <= threshold) {
      return { cls: 'pts-near-avg', symbol: '•', label: 'Blisko średniej', diff };
    }
    if (diff > 0) {
      return { cls: 'pts-above-avg', symbol: '↑', label: 'Powyżej średniej', diff };
    }
    return { cls: 'pts-below-avg', symbol: '↓', label: 'Poniżej średniej', diff };
  }

  // Tooltip handling (mobile mode icon):
  // We render a single tooltip "portal" attached to <body>, positioned with `position:fixed`,
  // so it never gets clipped by table/container overflow (iOS Safari).
  const modeTooltipPortal = (() => {
    const el = document.createElement('div');
    el.className = 'mode-tooltip-portal';
    el.setAttribute('role', 'tooltip');
    document.body.appendChild(el);
    return el;
  })();

  let openModeTooltipFor = null; // HTMLElement (.w-mode-wrap) currently owning the tooltip

  function hideModeTooltipPortal() {
    openModeTooltipFor = null;
    modeTooltipPortal.classList.remove('show');
    modeTooltipPortal.textContent = '';
  }

  function showModeTooltipPortal(btnEl, wrapEl) {
    const modeFull = (wrapEl && wrapEl.dataset && wrapEl.dataset.modeFull) ? wrapEl.dataset.modeFull : '';
    if (!modeFull) return;

    // Toggle: clicking the same icon closes it.
    if (openModeTooltipFor === wrapEl && modeTooltipPortal.classList.contains('show')) {
      hideModeTooltipPortal();
      return;
    }

    openModeTooltipFor = wrapEl;
    modeTooltipPortal.textContent = modeFull;
    modeTooltipPortal.classList.add('show');

    // Position after layout, then clamp inside viewport.
    requestAnimationFrame(() => {
      const rect = btnEl.getBoundingClientRect();
      const tipRect = modeTooltipPortal.getBoundingClientRect();

      const pad = 8;
      // Prefer below the icon; if not enough space, place above.
      let top = rect.bottom + 6;
      if (top + tipRect.height + pad > window.innerHeight) {
        top = rect.top - tipRect.height - 6;
      }
      top = Math.max(pad, Math.min(top, window.innerHeight - tipRect.height - pad));

      // Align right edge with icon right edge (nice on lists), then clamp.
      let left = rect.right - tipRect.width;
      left = Math.max(pad, Math.min(left, window.innerWidth - tipRect.width - pad));

      modeTooltipPortal.style.top = `${top}px`;
      modeTooltipPortal.style.left = `${left}px`;
    });
  }

  // Capture phase so we intercept before the war-row click handler.
  document.addEventListener('click', (e) => {
    const btn = e.target.closest && e.target.closest('.mode-icon-btn');
    if (btn) {
      e.preventDefault();
      e.stopPropagation();
      const wrap = btn.closest('.w-mode-wrap');
      if (!wrap) return;
      showModeTooltipPortal(btn, wrap);
      return;
    }
    // Click anywhere else closes.
    hideModeTooltipPortal();
  }, true);

  // Close tooltip on scroll/resize (mobile UX)
  window.addEventListener('scroll', hideModeTooltipPortal, { passive: true });
  window.addEventListener('resize', hideModeTooltipPortal);


  async function loadAll() {
    const [warsResp, rosterResp, upcomingResp] = await Promise.all([
      fetch('/api/wars'),
      fetch('/api/roster'),
      fetch('/api/upcoming')
    ]);
    const warsData = await warsResp.json();
    const rosterData = await rosterResp.json();
    let upcomingData = null;
    try { upcomingData = await upcomingResp.json(); } catch (_) { upcomingData = null; }
    const wars = Array.isArray(warsData) ? warsData : (warsData.wars || []);
    const roster = Array.isArray(rosterData) ? rosterData : (rosterData.roster || []);
    window.__ALL_WARS__ = wars;
    window.__ROSTER__ = roster;
    window.__UPCOMING__ = (upcomingData && upcomingData.upcoming) ? upcomingData.upcoming : null;

    // Init scaled/raw checkbox from localStorage and re-render on change.
    try {
      const saved = localStorage.getItem(LS_USE_SCALED);
      if (saved === null) setUseScaledPoints(true);
      else setUseScaledPoints(saved === '1');
    } catch (_) { setUseScaledPoints(true); }
    const cb = document.getElementById('toggleScaledPoints');
    if (cb && !cb.__bound) {
      cb.__bound = true;
      cb.addEventListener('change', () => {
        setUseScaledPoints(cb.checked);
        renderWars();
        renderRosterAverages();
      });
    }
    initFilters(wars);
    renderWars();
    renderRosterAverages();
  }

  function uniqSorted(arr) {
    return Array.from(new Set(arr.filter(Boolean))).sort((a,b)=>String(a).localeCompare(String(b),'pl'));
  }

  function initFilters(wars) {
    const modeSel = document.getElementById('filterMode');
    const oppSel = document.getElementById('filterOpponent');

    const modes = uniqSorted(wars.map(w => (w.mode || '').trim() || '-'));
    // Opponent filter uses backend-provided grouping so OCR variants collapse
    // into one entry (e.g. SAMYELI vs SAMYELİ).
    const oppMap = {};
    for (const w of wars) {
      const gid = (w.opponent_group || '').trim() || ((w.opponent_alliance || '').trim() || '-');
      const lbl = (w.opponent_group_label || '').trim() || ((w.opponent_alliance || '').trim() || '-');
      if (!oppMap[gid]) oppMap[gid] = lbl;
    }
    const opps = Object.entries(oppMap)
      .sort((a,b)=> String(a[1]).localeCompare(String(b[1]), 'pl'));

    modeSel.innerHTML = '<option value="">Tryb: wszystkie</option>';
    for (const m of modes) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      modeSel.appendChild(opt);
    }

    oppSel.innerHTML = '<option value="">Przeciwnik: wszyscy</option>';
    for (const [gid, lbl] of opps) {
      const opt = document.createElement('option');
      opt.value = gid;
      opt.textContent = lbl;
      oppSel.appendChild(opt);
    }

    document.getElementById('filterResult').onchange = renderWars;
    modeSel.onchange = renderWars;
    oppSel.onchange = renderWars;
    document.getElementById('sortBy').onchange = renderWars;
  }

  function applyFiltersAndSort(wars) {
    const fRes = document.getElementById('filterResult').value;
    const fMode = document.getElementById('filterMode').value;
    const fOpp = document.getElementById('filterOpponent').value;
    const sortBy = document.getElementById('sortBy').value;

    let out = wars.slice();
    if (fRes) out = out.filter(w => String(w.result || '').trim() === fRes);
    if (fMode) out = out.filter(w => ((w.mode || '').trim() || '-') === fMode);
    if (fOpp) out = out.filter(w => (((w.opponent_group || '').trim() || ((w.opponent_alliance || '').trim() || '-')) === fOpp));

    const keyDate = (w) => Number(w.created_at_ts || 0);
    const keyDiff = (w) => Number(w.diff || 0);
    const keyResult = (w) => (/zwyci/i.test(w.result||'') ? 1 : 0);
    const keyMode = (w) => String((w.mode||'').trim() || '-');

    if (sortBy === 'date_desc') {
      out.sort((a,b)=> keyDate(b) - keyDate(a));
    } else if (sortBy === 'diff_desc') {
      out.sort((a,b)=> keyDiff(b) - keyDiff(a) || keyDate(b)-keyDate(a));
    } else if (sortBy === 'result') {
      out.sort((a,b)=> keyResult(b) - keyResult(a) || keyDiff(b)-keyDiff(a) || keyDate(b)-keyDate(a));
    } else if (sortBy === 'mode') {
      out.sort((a,b)=> keyMode(a).localeCompare(keyMode(b),'pl') || keyDate(b)-keyDate(a));
    }

    return out;
  }

  function renderWars() {
    const wars = Array.isArray(window.__ALL_WARS__) ? window.__ALL_WARS__ : [];
    const filtered = applyFiltersAndSort(wars);
    const useScaled = getUseScaledPoints();
    const tbody = document.querySelector('#warsTable tbody');
    tbody.innerHTML = '';

    // Bilans W-D-L liczony ze wszystkich wojen (niezależnie od filtrów)
    const wins = wars.filter(w => /zwyci/i.test(String(w.result || ''))).length;
    const draws = wars.filter(w => /remis/i.test(String(w.result || ''))).length;
    const losses = wars.filter(w => /(poraż|przegr)/i.test(String(w.result || ''))).length;
    const summaryEl = document.getElementById('warsSummary');
    if (summaryEl) {
      summaryEl.innerHTML = `(<span class="count-win">${wins}</span>-<span class="count-draw">${draws}</span>-<span class="count-loss">${losses}</span>)`;
    }

    document.getElementById('warsCount').textContent = `Wojny: ${filtered.length} / ${wars.length}`;

    // Domyślnie pokazuj tylko 5 ostatnich wojen. Stan "Pokaż więcej" utrzymujemy
    // do kliknięcia "Pokaż mniej" lub odświeżenia strony.
    const toggleBtn = document.getElementById('warsToggleBtn');
    const showAll = !!window.__WARS_EXPANDED__;
    const list = showAll ? filtered : filtered.slice(0, 5);
    if (toggleBtn) {
      if (filtered.length > 5) {
        toggleBtn.style.display = '';
        toggleBtn.textContent = showAll ? 'Pokaż mniej' : 'Pokaż więcej';
        toggleBtn.onclick = () => {
          window.__WARS_EXPANDED__ = !showAll;
          renderWars();
        };
      } else {
        toggleBtn.style.display = 'none';
      }
    }

    // Show predicted upcoming war as the very first row (above the history list)
    // ONLY in the main (unfiltered) view. When the user filters/sorts, hide it
    // to avoid mixing "virtual" rows with real history.
    const upcoming = window.__UPCOMING__;
    const fRes0 = document.getElementById('filterResult').value;
    const fMode0 = document.getElementById('filterMode').value;
    const fOpp0 = document.getElementById('filterOpponent').value;
    const sort0 = document.getElementById('sortBy').value;
    const isMainView = (!fRes0 && !fMode0 && !fOpp0 && (sort0 === 'date_desc'));
    try {
      if (isMainView && upcoming && upcoming.date_ts && upcoming.mode) {
        const uDateText = escapeHtml(fmtDate(upcoming.date_ts || 0));
        const uMode = (upcoming.mode || '').trim() || '-';
        const uRes = 'Nadchodząca';
        const utr = document.createElement('tr');
        // Reuse the same layout rules as normal war rows (especially on mobile).
        utr.className = 'war-row upcoming-row';
        utr.innerHTML = `
          <td data-label="Data">
            <div class="war-line">
              <span class="w-date">${uDateText}</span>
              <span class="pill warn">${escapeHtml(uRes)}</span>
              <span class="w-diff">—</span>
              <span class="w-opp">—</span>
              <span class="w-mode-wrap" data-mode-full="${escapeHtml(uMode)}">
                <button class="mode-icon-btn" type="button" aria-label="Tryb wojny">
                  <img class="mode-icon" src="${escapeHtml(getModeIconSrc(uMode))}" alt="${escapeHtml(uMode)}"/>
                </button>
              </span>
            </div>
            <span class="w-date-only">${uDateText}</span>
          </td>
          <td data-label="Wynik"><span class="pill warn">${escapeHtml(uRes)}</span></td>
          <td class="right" data-label="Różnica">—</td>
          <td data-label="Przeciwnik">—</td>
          <td data-label="Tryb">
            <span class="mode-cell" title="${escapeHtml(uMode)}">
              <img class="mode-icon mode-icon-inline" src="${escapeHtml(getModeIconSrc(uMode))}" alt="${escapeHtml(uMode)}"/>
              <span class="mode-name">${escapeHtml(uMode)}</span>
            </span>
          </td>
        `;
        tbody.appendChild(utr);
      }
    } catch (_) {}

    for (const w of list) {
      const res = w.result || '';
      const isWin = /zwyci/i.test(res);
      const isLoss = /(poraż|przegr)/i.test(res);
      const isDraw = /remis/i.test(res);
      const pillClass = isWin ? 'ok' : (isLoss ? 'bad' : '');
      const diff = Number(w.diff || 0);
      const oorN = Number(w.out_of_roster_count || 0);

      const modeFull = (w.mode || '').trim() || '-';
      const modeShort = abbrMode(modeFull);
      const opp = (w.opponent_alliance || '').trim() || '-';

      const players = Array.isArray(w.players) ? w.players : [];

      const avgForPlayers = (arr) => {
        if (!arr.length) return NaN;
        const vals = arr.map(p => useScaled
          ? ((p.points_scaled_value !== undefined) ? Number(p.points_scaled_value) : Number((p.points !== undefined) ? p.points : p.points_raw || 0))
          : Number((p.points_raw !== undefined) ? p.points_raw : p.points || 0)
        ).filter(v => Number.isFinite(v));
        if (!vals.length) return NaN;
        return vals.reduce((a,b)=>a+b,0) / vals.length;
      };
      const avgSeparatorHtml = (avg) => `
        <tr class="avg-separator"><td colspan="4"><div class="avg-separator-line">Średni wynik <strong>${escapeHtml(avg.toFixed(1))}</strong></div></td></tr>
      `;
      const avgSeparatorMobileHtml = (avg) => `
        <div class="avg-separator"><div class="avg-separator-line">Średni wynik <strong>${escapeHtml(avg.toFixed(1))}</strong></div></div>
      `;
      const decoratePlayersByAverage = (arr) => {
        const avg = avgForPlayers(arr);
        let inserted = false;
        const rows = [];
        arr.forEach((p, idx) => {
          const shownPts = useScaled
            ? ((p.points_scaled_value !== undefined) ? Number(p.points_scaled_value) : Number((p.points !== undefined) ? p.points : p.points_raw || 0))
            : Number((p.points_raw !== undefined) ? p.points_raw : p.points || 0);
          const above = Number.isFinite(avg) && Number.isFinite(shownPts) ? shownPts >= avg : false;
          rows.push({ p, aboveAvg: above, avg });
          if (!inserted && Number.isFinite(avg) && idx < arr.length - 1) {
            const next = arr[idx + 1];
            const nextPts = useScaled
              ? ((next.points_scaled_value !== undefined) ? Number(next.points_scaled_value) : Number((next.points !== undefined) ? next.points : next.points_raw || 0))
              : Number((next.points_raw !== undefined) ? next.points_raw : next.points || 0);
            if (Number.isFinite(shownPts) && Number.isFinite(nextPts) && shownPts >= avg && nextPts < avg) {
              rows.push({ separator: true, avg });
              inserted = true;
            }
          }
        });
        if (!inserted && Number.isFinite(avg) && arr.length) {
          const firstPts = useScaled
            ? ((arr[0].points_scaled_value !== undefined) ? Number(arr[0].points_scaled_value) : Number((arr[0].points !== undefined) ? arr[0].points : arr[0].points_raw || 0))
            : Number((arr[0].points_raw !== undefined) ? arr[0].points_raw : arr[0].points || 0);
          if (Number.isFinite(firstPts) && firstPts < avg) rows.unshift({ separator: true, avg });
          else rows.push({ separator: true, avg });
        }
        return rows;
      };

      const mkPlayersRowHtml = (p, aboveAvg = null) => {
        const status = String(p.status || 'ok');
        const outsideNow = (p.outside_current_roster === true);
        let statusHtml = '';
        let rowClass = '';
        if (status === 'unassigned') { statusHtml = `<span class="pill warn status-pill">Niewidoczny</span>`; rowClass = 'row-unknown'; }
        else if (status === 'assigned') { statusHtml = `<span class="pill ok status-pill">Przypisane</span>`; }
        else if (status === 'unknown') { statusHtml = `<span class="pill warn status-pill">UNKNOWN</span>`; rowClass = 'row-unknown'; }
        else if (status === 'out_of_roster') { statusHtml = `<span class="pill warn status-pill">Poza rosterem</span>`; rowClass = 'row-oor'; }
        else if (outsideNow) { statusHtml = `<span class="pill warn status-pill">Poza rosterem</span>`; rowClass = 'row-oor'; }

        const r = String(p.rank ?? '').trim();
        const rankNum = r ? Number(r) : NaN;
        const rank = r ? String(r).padStart(2,'0') : '--';
        const name = escapeHtml(p.name ?? '');
        const shownPts = useScaled
          ? ((p.points_scaled_value !== undefined) ? p.points_scaled_value : ((p.points !== undefined) ? p.points : p.points_raw))
          : ((p.points_raw !== undefined) ? p.points_raw : p.points);
        const ptsNum = Number(shownPts || 0);
        const scaled = useScaled && !!p.points_scaled && (p.points_scaled_value !== undefined);
        const pts = escapeHtml((shownPts ?? '') );

        if (aboveAvg === true) rowClass = (rowClass ? rowClass + ' ' : '') + 'above-avg';
        else if (aboveAvg === false) rowClass = (rowClass ? rowClass + ' ' : '') + 'below-avg';

        return `
          <tr class="${rowClass}" data-rank="${Number.isFinite(rankNum) ? rankNum : ''}" data-pts="${Number.isFinite(ptsNum) ? ptsNum : ''}" data-name="${escapeHtml(p.name ?? '')}">
            <td class="player-col-rank right" data-label="#"><span class="rank-badge">${escapeHtml(rank)}</span></td>
            <td class="player-col-name" data-label="Gracz">${name}</td>
            <td class="player-col-pts right" data-label="Pkt"><span class="pts" title="${scaled ? 'Wynik przeliczony (wojna nie 30v30)' : (useScaled ? '' : (p.points_scaled ? 'Wynik surowy (odznaczono przeliczanie)' : ''))}">${pts}</span></td>
            <td class="player-col-status status-cell" data-label="Status">${statusHtml || '<span class="muted small">—</span>'}</td>
          </tr>

      };

      const mkPlayersLineHtml = (p, aboveAvg = null) => {
        const status = String(p.status || 'ok');
        const outsideNow = (p.outside_current_roster === true);
        let statusHtml = '<span class="muted small">—</span>';
        let rowClass = '';
        if (status === 'unassigned') { statusHtml = `<span class="pill warn">Niewidoczny</span>`; rowClass = 'row-unknown'; }
        else if (status === 'assigned') { statusHtml = `<span class="pill ok">Przypisane</span>`; }
        else if (status === 'unknown') { statusHtml = `<span class="pill warn">UNKNOWN</span>`; rowClass = 'row-unknown'; }
        else if (status === 'out_of_roster') { statusHtml = `<span class="pill warn">Poza rosterem</span>`; rowClass = 'row-oor'; }
        else if (outsideNow) { statusHtml = `<span class="pill warn">Poza rosterem</span>`; rowClass = 'row-oor'; }

        const r = String(p.rank ?? '').trim();
        const rankNum = r ? Number(r) : NaN;
        const rank = r ? String(r).padStart(2,'0') : '--';
        const name = escapeHtml(p.name ?? '');
        const shownPts = useScaled
          ? ((p.points_scaled_value !== undefined) ? p.points_scaled_value : ((p.points !== undefined) ? p.points : p.points_raw))
          : ((p.points_raw !== undefined) ? p.points_raw : p.points);
        const ptsNum = Number(shownPts || 0);
        const scaled = useScaled && !!p.points_scaled && (p.points_scaled_value !== undefined);
        const pts = escapeHtml((shownPts ?? '') );

        if (aboveAvg === true) rowClass = (rowClass ? rowClass + ' ' : '') + 'above-avg';
        else if (aboveAvg === false) rowClass = (rowClass ? rowClass + ' ' : '') + 'below-avg';

        return `
          <div class="player-line ${rowClass}" data-rank="${Number.isFinite(rankNum) ? rankNum : ''}" data-pts="${Number.isFinite(ptsNum) ? ptsNum : ''}" data-name="${escapeHtml(p.name ?? '')}">
            <span class="rank-badge">${escapeHtml(rank)}</span>
            <span class="pname">${name}</span>
            <span class="pts" title="${scaled ? 'Wynik przeliczony (wojna nie 30v30)' : (useScaled ? '' : (p.points_scaled ? 'Wynik surowy (odznaczono przeliczanie)' : ''))}">${pts}</span>
            <span class="pstatus">${statusHtml}</span>
          </div>
        `;
      };

      const buildPlayersRowsHtml = (arr) => decoratePlayersByAverage(arr).map(item => {
        if (item.separator) return avgSeparatorHtml(item.avg);
        return mkPlayersRowHtml(item.p, item.aboveAvg);
      }).join('');
      const buildPlayersMobileHtml = (arr) => decoratePlayersByAverage(arr).map(item => {
        if (item.separator) return avgSeparatorMobileHtml(item.avg);
        return mkPlayersLineHtml(item.p, item.aboveAvg);
      }).join('');
      const playersRowsHtml = buildPlayersRowsHtml(players);
      const playersMobileHtml = buildPlayersMobileHtml(players);

      const tr = document.createElement('tr');
      tr.className = 'war-row' + (isWin ? ' row-win' : (isLoss ? ' row-loss' : ''));

      const detailsTr = document.createElement('tr');
      detailsTr.className = 'details-row';
      detailsTr.style.display = 'none';
      const wid = (w.war_id || '').trim();
      const scoreOpp = (w.opponent_score ?? w.enemy_score ?? '');
      const diffText = (diff >= 0 ? '+' : '') + diff;
      const metaId = wid ? `<span class="war-meta muted small">ID: <code>${escapeHtml(wid)}</code></span>` : '';

      detailsTr.innerHTML = `<td colspan="5">
        <div class="war-details">
          <div class="war-details-header">
            ${metaId}
            <span class="pill ${pillClass}">${escapeHtml(res)}</span>
            <span class="pill">Tryb: ${escapeHtml(modeFull)}</span>
            <span class="pill">My: ${escapeHtml(w.our_score ?? '')}</span>
            <span class="pill">Ich: ${escapeHtml(scoreOpp)}</span>
            <span class="pill">Różnica: ${escapeHtml(diffText)}</span>
            <span class="pill">Przeciwnik: ${escapeHtml(opp)}</span>
          </div>
          <div class="players-wrap">
            <table class="players-table">
              <thead>
                <tr>
                  <th class="right" data-sort="rank" title="Kliknij, aby sortować">#</th>
                  <th data-sort="name" title="Kliknij, aby sortować">Gracz</th>
                  <th class="right" data-sort="pts" title="Kliknij, aby sortować">Pkt</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${players.length ? playersRowsHtml : `<tr><td colspan="4" class="muted small">Brak listy graczy w tej wojnie.</td></tr>`}
              </tbody>
            </table>
            <div class="players-mobile">
              ${players.length ? playersMobileHtml : `<div class="muted small">Brak listy graczy w tej wojnie.</div>`}
            </div>
          </div>
        </div>
      </td>`;

      // Sortowanie listy graczy w szczegółach wojny
      if (players.length) {
        const table = detailsTr.querySelector('.players-table');
        const body = table ? table.querySelector('tbody') : null;
        const heads = table ? table.querySelectorAll('thead th[data-sort]') : [];
        let sortKey = 'rank';
        let sortDir = 'asc';

        const sortPlayers = (key, dir) => {
          const arr = players.slice();
          const mul = dir === 'asc' ? 1 : -1;
          arr.sort((a, b) => {
            if (key === 'rank') return mul * ((Number(a.rank||0) - Number(b.rank||0)) || String(a.name||'').localeCompare(String(b.name||''),'pl'));
            if (key === 'pts') return mul * ((Number(a.points||0) - Number(b.points||0)) || (Number(a.rank||0) - Number(b.rank||0)));
            return mul * String(a.name||'').localeCompare(String(b.name||''),'pl') || (Number(a.rank||0) - Number(b.rank||0));
          });
          return arr;
        };

        const renderPlayers = () => {
          const arr = sortPlayers(sortKey, sortDir);
          if (body) body.innerHTML = buildPlayersRowsHtml(arr);
          const mob = detailsTr.querySelector('.players-mobile');
          if (mob) mob.innerHTML = buildPlayersMobileHtml(arr);
        };

        heads.forEach(th => {
          th.style.cursor = 'pointer';
          th.onclick = () => {
            const key = th.getAttribute('data-sort');
            if (!key) return;
            if (sortKey === key) sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
            else {
              sortKey = key;
              sortDir = (key === 'pts') ? 'desc' : 'asc';
            }
            renderPlayers();
          };
        });
      }

      const dateText = escapeHtml(fmtDate(w.created_at_ts || 0));
      // Compact one-line summary for mobile (only first cell is shown there).
      // Desktop shows separate columns.
      tr.innerHTML = `
        <td data-label="Data">
          <div class="war-line">
            <span class="w-date">${dateText}</span>
            <span class="pill ${pillClass}">${escapeHtml(res)}</span>
            <span class="w-diff">${escapeHtml((diff >= 0 ? '+' : '') + diff)}</span>
            <span class="w-opp">${escapeHtml(opp)}</span>
            <span class="w-mode-wrap" data-mode-full="${escapeHtml(modeFull)}">
              <button class="mode-icon-btn" type="button" aria-label="Tryb wojny">
                <img class="mode-icon" src="${escapeHtml(getModeIconSrc(modeFull))}" alt="${escapeHtml(modeFull)}"/>
              </button>
                          </span>
          </div>
          <span class="w-date-only">${dateText}</span>
        </td>
        <td data-label="Wynik"><span class="pill ${pillClass}">${escapeHtml(res)}</span></td>
        <td class="right" data-label="Różnica">${escapeHtml((diff >= 0 ? '+' : '') + diff)}</td>
        <td data-label="Przeciwnik">${escapeHtml(opp)}</td>
        <td data-label="Tryb">
          <span class="mode-cell" title="${escapeHtml(modeFull)}">
            <img class="mode-icon mode-icon-inline" src="${escapeHtml(getModeIconSrc(modeFull))}" alt="${escapeHtml(modeFull)}"/>
            <span class="mode-name">${escapeHtml(modeFull)}</span>
          </span>
        </td>
      `;

      // Toggle details by clicking the whole war row.
      // Do not toggle when clicking inside an already-open details block.
      const toggleDetails = () => {
        const isOpen = detailsTr.style.display !== 'none';
        detailsTr.style.display = isOpen ? 'none' : '';
      };
      tr.onclick = (e) => {
        // Clicking the mode icon / tooltip should only toggle the tooltip, not expand the war.
        if (e && e.target && e.target.closest && e.target.closest('.w-mode-wrap')) return;
        toggleDetails();
      };
      tr.onkeydown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleDetails();
        }
      };
      tr.setAttribute('tabindex', '0');
      detailsTr.onclick = (e) => e.stopPropagation();
      tbody.appendChild(tr);
      tbody.appendChild(detailsTr);
    }
  }

  function renderRosterAverages() {
    const wars = Array.isArray(window.__ALL_WARS__) ? window.__ALL_WARS__ : [];
    const roster = Array.isArray(window.__ROSTER__) ? window.__ROSTER__ : [];

    // Preserve UI state across re-renders (e.g., toggling "Punkty przeliczone"):
    // - keep "Pokaż więcej" expanded state
    // - keep which player details are currently expanded
    // Keep an in-memory set of expanded player rows, so we can restore it even if
    // the DOM text changes a bit (badges/icons/whitespace).
    const prevOpenNames = new Set(Array.isArray(window.__AVG_OPEN_NAMES__) ? window.__AVG_OPEN_NAMES__ : []);
    try {
      const tbodyPrev = document.querySelector('#rosterTable tbody');
      if (tbodyPrev) {
        // Determine whether the user expanded "Pokaż więcej" previously.
        let showMore = false;
        const moreMain = tbodyPrev.querySelectorAll('tr.more-row:not(.details-row)');
        for (const tr of moreMain) {
          if (tr.style.display !== 'none') { showMore = true; break; }
        }
        window.__AVG_SHOW_MORE__ = showMore;

        // Collect expanded player names.
        const detailRows = tbodyPrev.querySelectorAll('tr.details-row');
        for (const dtr of detailRows) {
          if (dtr.dataset && dtr.dataset.open === '1') {
            const name = (dtr.dataset && dtr.dataset.player) ? String(dtr.dataset.player) : '';
            if (name) prevOpenNames.add(name);
          }
        }
      }
    } catch (_) {}
    window.__AVG_OPEN_NAMES__ = Array.from(prevOpenNames);
    const sel = document.getElementById('avgX');
    const n = wars.length;
    const prevVal = sel.value;
    sel.innerHTML = '';
    const max = Math.max(1, n);
    for (let i=1; i<=max; i++) {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = String(i);
      sel.appendChild(opt);
    }
    sel.value = prevVal ? String(Math.min(Number(prevVal), max)) : String(Math.min(10, max));

    let expanded = !!window.__AVG_SHOW_MORE__;

    // Format points: show integers without decimals, otherwise 1 decimal.
    const fmtPts = (n) => {
      if (n === null || n === undefined) return '-';
      const x = Number(n);
      if (Number.isNaN(x)) return '-';
      if (Math.abs(x - Math.round(x)) < 1e-9) return String(Math.round(x));
      return x.toFixed(1);
    };

    // Popover note for scaled chips (wars where participants != 30)
    const ensureChipNote = () => {
      let note = document.getElementById('chipNote');
      if (!note) {
        note = document.createElement('div');
        note.id = 'chipNote';
        note.className = 'chip-note';
        document.body.appendChild(note);
        document.addEventListener('click', () => {
          try { note.style.display = 'none'; } catch (_) {}
        });
      }
      return note;
    };
    const showChipNote = (text, anchorEl) => {
      const note = ensureChipNote();
      note.textContent = text;
      note.style.display = 'block';
      const r = anchorEl.getBoundingClientRect();
      let left = r.left;
      let top = r.bottom + 8;
      // clamp
      const pad = 12;
      const maxLeft = window.innerWidth - pad;
      if (left > maxLeft) left = maxLeft;
      if (left < pad) left = pad;
      if (top + note.offsetHeight > window.innerHeight - pad) {
        top = Math.max(pad, r.top - note.offsetHeight - 8);
      }
      note.style.left = `${Math.round(left)}px`;
      note.style.top = `${Math.round(top)}px`;
    };

    const render = () => {
      const x = Number(sel.value || 1);
      const useScaled = getUseScaledPoints();
      // Średnia ma być liczona z X NAJŚWIEŻSZYCH wojen (po dacie dodania screenów na Discordzie),
      // niezależnie od aktualnego sortowania/filtrów tabeli na stronie.
      const warsSorted = wars.slice().sort((a, b) => Number(b.created_at_ts || 0) - Number(a.created_at_ts || 0));
      const slice = warsSorted.slice(0, x);

      // Compare current ranking (last X wars) with the previous window (wars 2..X+1).
      // This gives "how the last war affected the player's position".
      const prevSlice = warsSorted.slice(1, x + 1);

      const buildRowsForSlice = (warSlice, wantPoints) => {
        // For averages we count only wars where the player is present in the list.
        // (We do NOT divide by X if the player did not participate.)
        const statsByName = new Map();
        for (const name of roster) {
          statsByName.set(name, { sum: 0, count: 0, points: wantPoints ? Array(x).fill(null) : null });
        }
        for (let i = 0; i < warSlice.length; i++) {
          const w = warSlice[i];
          const map = new Map();
          for (const p of (w.players || [])) {
            map.set(p.name, p);
          }
          for (const name of roster) {
            const s = statsByName.get(name);
            if (!s) continue;
            if (map.has(name)) {
              const pobj = map.get(name) || {};
              const raw = Number((pobj.points_raw !== undefined) ? pobj.points_raw : ((pobj.points !== undefined) ? pobj.points : 0));
              const eff = Number((pobj.points_scaled_value !== undefined) ? pobj.points_scaled_value : raw);
              const scaled = !!pobj.points_scaled && (pobj.points_scaled_value !== undefined);
              const ptsUsed = useScaled ? eff : raw;
              const participants = (pobj.participants !== undefined && pobj.participants !== null) ? Number(pobj.participants) : null;
              if (wantPoints && s.points) {
                s.points[i] = {
                  v: ptsUsed,
                  raw,
                  eff,
                  scaled,
                  participants,
                  warId: (w.war_id || ''),
                  rank: (pobj.rank !== undefined ? Number(pobj.rank) : null),
                  warTs: Number(w.created_at_ts || 0),
                  mode: (w.mode || '').trim() || '-',
                  warAvg: getWarAverageForPlayers(w.players || [], useScaled),
                };
              }
              s.sum += ptsUsed;
              s.count += 1;
            }
          }
        }
        const calcTrendAndStab = (ptsArr) => {
          if (!Array.isArray(ptsArr)) return { trend: null, stab: null };
          // ptsArr is ordered from newest -> oldest (same as warsSorted slice)
          const vals = [];
          for (const v of ptsArr) {
            const isObj = (v && typeof v === 'object');
            const n = isObj ? v.v : v;
            if (typeof n === 'number' && !Number.isNaN(n)) vals.push(n);
          }

          // Wahanie (range): max-min over available wars for this player.
          let stab = null;
          if (vals.length >= 2) {
            let mn = vals[0], mx = vals[0];
            for (const x of vals) { if (x < mn) mn = x; if (x > mx) mx = x; }
            stab = mx - mn;
          } else if (vals.length === 1) {
            stab = 0;
          }

          // Forma (trend): newer half vs older half of the window (player-only wars).
          // For X=10 -> avg of last 5 wars minus avg of previous 5 (if player has enough).
          let trend = null;
          const n = vals.length;
          const half = Math.floor(n / 2);
          if (half >= 2) {
            const newer = vals.slice(0, half);
            const older = vals.slice(half, half * 2);
            if (older.length === half) {
              const a = newer.reduce((x,y)=>x+y,0) / newer.length;
              const b = older.reduce((x,y)=>x+y,0) / older.length;
              trend = a - b;
            }
          }
          return { trend, stab };
        };

        return roster.map(name => {
          const s = statsByName.get(name) || { sum: 0, count: 0, points: wantPoints ? Array(x).fill(null) : null };
          const avg = s.count ? (s.sum / s.count) : 0;
          const pts = wantPoints ? (s.points || Array(x).fill(null)) : null;
          const extra = wantPoints ? calcTrendAndStab(pts) : { trend: null, stab: null };
          return { name, avg, sum: s.sum, warsCount: s.count, points: pts, trend: extra.trend, stab: extra.stab };
        }).sort((a,b)=> (b.avg - a.avg) || (b.sum - a.sum) || a.name.localeCompare(b.name));
      };

      const rows = buildRowsForSlice(slice, true);
      const prevRows = (prevSlice.length === x) ? buildRowsForSlice(prevSlice, false) : null;

      const prevRankByName = new Map();
      if (prevRows) {
        prevRows.forEach((r, idx) => prevRankByName.set(r.name, idx + 1));
      }

      const trendHtml = (currentRank, name) => {
        if (!prevRows) return '<span class="rank-same">–</span>';
        const prevRank = prevRankByName.get(name);
        if (!prevRank) return '<span class="rank-same">–</span>';
        const diff = prevRank - currentRank; // positive => moved up
        if (diff > 0) return `<span class="rank-up" title="Poprzednio #${prevRank}">▲${diff}</span>`;
        if (diff < 0) return `<span class="rank-down" title="Poprzednio #${prevRank}">▼${Math.abs(diff)}</span>`;
        return `<span class="rank-same" title="Bez zmiany (poprzednio #${prevRank})">•0</span>`;
      };

      const top = rows.slice(0, 5);
      const rest = rows.slice(5);

      const tbody = document.querySelector('#rosterTable tbody');
      tbody.innerHTML = '';
      // Preserve the current "Pokaż więcej/mniej" state when changing X,
      // so the user doesn't need to re-expand the list every time.

      rows.forEach((r, idx) => {
        const tr = document.createElement('tr');
        const detailsTr = document.createElement('tr');
        detailsTr.className = 'details-row';
        detailsTr.style.display = 'none';

        // Stable key for restoring expanded state across renders.
        tr.dataset.player = r.name;
        detailsTr.dataset.player = r.name;

        const isMore = idx >= 5;
        if (isMore) {
          tr.classList.add('more-row');
          detailsTr.classList.add('more-row');
          // Keep "more" rows visible if the user previously clicked "Pokaż więcej".
          tr.style.display = expanded ? '' : 'none';
          detailsTr.style.display = 'none';
        }

        // Details row (hidden by default). We only expand it by clicking the arrow next to the nick.
        const tdDetails = document.createElement('td');
        tdDetails.colSpan = 7;
        tdDetails.className = 'small muted';

        const detailWrap = document.createElement('div');
        detailWrap.className = 'points-detail';

        const label = document.createElement('span');
        label.className = 'points-label';
        label.textContent = 'Pkt z wojen:';

        const chips = document.createElement('span');
        chips.className = 'points-chips';

        // Highlight min/max values in the player's recent war points (ignore missing '-').
        const nums = (r.points || []).map(v => (v && typeof v === 'object') ? v.v : v).filter(v => typeof v === 'number' && !Number.isNaN(v));
        const minVal = nums.length ? Math.min(...nums) : null;
        const maxVal = nums.length ? Math.max(...nums) : null;
        for (const v of (r.points || [])) {
          const chip = document.createElement('span');
          chip.className = 'pts-chip';

          const isObj = (v && typeof v === 'object');
          const eff = isObj ? v.v : v;
          const shownTxt = (eff === null || eff === undefined) ? '-' : fmtPts(eff);
          const relation = isObj ? getAverageRelationInfo(eff, v.warAvg) : { cls: '', symbol: '', label: '', diff: null };

          if (relation.cls) chip.classList.add(relation.cls);

          const content = document.createElement('span');
          content.className = 'pts-chip-wrap';

          if (isObj) {
            const modeIcon = document.createElement('img');
            modeIcon.className = 'chip-mode-icon';
            modeIcon.src = getModeIconSrc(v.mode || '');
            modeIcon.alt = String(v.mode || 'Tryb wojny');
            modeIcon.loading = 'lazy';
            content.appendChild(modeIcon);
          }

          const valueEl = document.createElement('span');
          valueEl.className = 'chip-value';
          valueEl.textContent = shownTxt;
          content.appendChild(valueEl);

          if (isObj && relation.symbol) {
            const ind = document.createElement('span');
            ind.className = 'chip-avg-ind';
            ind.textContent = relation.symbol;
            ind.setAttribute('aria-hidden', 'true');
            content.appendChild(ind);
          }

          if (isObj) {
            const rankNum = Number(v.rank);
            const rankInline = document.createElement('span');
            rankInline.className = 'chip-rank-inline';
            if (Number.isFinite(rankNum) && rankNum >= 1 && rankNum <= 3) {
              const podium = document.createElement('span');
              podium.className = 'chip-podium';
              podium.textContent = rankNum === 1 ? '🥇' : (rankNum === 2 ? '🥈' : '🥉');
              podium.setAttribute('aria-hidden', 'true');
              rankInline.appendChild(podium);
            }
            const rankText = document.createElement('span');
            rankText.textContent = Number.isFinite(rankNum) ? `#${rankNum}` : '#–';
            rankInline.appendChild(rankText);
            content.appendChild(rankInline);
          }

          chip.appendChild(content);

          // Tooltip: show war date, mode, average relation and raw/scaled values if available.
          try {
            const warDate = (isObj && v.warTs) ? fmtDate(v.warTs) : '';
            if (isObj) {
              const rawTxt = (v.raw !== undefined && v.raw !== null) ? fmtPts(v.raw) : '-';
              const effTxt = (v.eff !== undefined && v.eff !== null) ? fmtPts(v.eff) : fmtPts(eff);
              const avgTxt = (v.warAvg !== undefined && v.warAvg !== null && Number.isFinite(Number(v.warAvg))) ? fmtPts(v.warAvg) : '-';
              const diffTxt = (relation.diff !== null && relation.diff !== undefined && Number.isFinite(Number(relation.diff)))
                ? `${Number(relation.diff) >= 0 ? '+' : ''}${fmtPts(relation.diff)}`
                : '-';
              const partTxt = v.participants ? `${v.participants}v${v.participants}` : 'XvX';
              const modeTxt = v.mode || '-';
              const rankTxt = (v.rank !== undefined && v.rank !== null && Number.isFinite(Number(v.rank))) ? ` • Pozycja: #${Number(v.rank)}` : '';
              chip.title = `${warDate ? `Wojna: ${warDate} • ` : ''}Tryb: ${modeTxt}${rankTxt} • Pkt: ${shownTxt} • Średnia wojny: ${avgTxt} • Różnica: ${diffTxt}${v.scaled ? ` • ${partTxt}: raw=${rawTxt}, przel=${effTxt}` : ''}`;
            } else {
              chip.title = `Pkt: ${shownTxt}`;
            }
          } catch (_) {}

          // For wars where points were scaled (X!=30):
          // - when showing scaled points: highlight
          // - when showing raw points: still allow click to see both values
          if (isObj && v.scaled) {
            if (useScaled) chip.classList.add('pts-scaled');
            chip.dataset.raw = String(v.raw);
            chip.dataset.participants = v.participants ? String(v.participants) : '';
            chip.dataset.eff = String(v.eff !== undefined ? v.eff : eff);
            chip.dataset.shown = String(eff);
            chip.onclick = (e) => {
              try { e.stopPropagation(); } catch (_) {}
              const part = v.participants ? `${v.participants}v${v.participants}` : 'XvX';
              const shownLabel = useScaled ? 'przeliczony' : 'surowy';
              const shownVal = useScaled ? (v.eff !== undefined ? v.eff : eff) : v.raw;
              const otherVal = useScaled ? v.raw : (v.eff !== undefined ? v.eff : eff);
              const avgTxt = (v.warAvg !== undefined && v.warAvg !== null && Number.isFinite(Number(v.warAvg))) ? fmtPts(v.warAvg) : '-';
              const diffTxt = (relation.diff !== null && relation.diff !== undefined && Number.isFinite(Number(relation.diff)))
                ? `${Number(relation.diff) >= 0 ? '+' : ''}${fmtPts(relation.diff)}`
                : '-';
              showChipNote(
                `Tryb: ${v.mode || '-'}${Number.isFinite(Number(v.rank)) ? ` • Pozycja #${Number(v.rank)}` : ''} • Wojna ${part}: pokazujesz wynik ${shownLabel} = ${fmtPts(shownVal)}. Drugi wariant = ${fmtPts(otherVal)}. Średnia wojny = ${avgTxt}, różnica = ${diffTxt}.`,
                chip
              );
            };
          }

          // If all values are equal (min==max), don't highlight.
          if (typeof eff === 'number' && minVal !== null && maxVal !== null && minVal !== maxVal) {
            if (eff === minVal) chip.classList.add('pts-min');
            if (eff === maxVal) chip.classList.add('pts-max');
          }
          chips.appendChild(chip);
        }

        detailWrap.appendChild(label);
        detailWrap.appendChild(chips);

        tdDetails.appendChild(detailWrap);
        detailsTr.appendChild(tdDetails);

        // Nick. Row click toggles details.
        const nameSpan = document.createElement('span');
        nameSpan.className = 'player-name';
        nameSpan.textContent = r.name;

        // Track open/closed state so "Pokaż więcej" does not auto-expand detail rows.
        detailsTr.dataset.open = '0';

        const setOpen = (open) => {
          detailsTr.dataset.open = open ? '1' : '0';
          detailsTr.style.display = open ? '' : 'none';
          tr.setAttribute('aria-expanded', open ? 'true' : 'false');

          // Persist expanded state for future re-renders.
          try {
            const s = new Set(Array.isArray(window.__AVG_OPEN_NAMES__) ? window.__AVG_OPEN_NAMES__ : []);
            if (open) s.add(r.name); else s.delete(r.name);
            window.__AVG_OPEN_NAMES__ = Array.from(s);
          } catch (_) {}
        };

        const toggle = () => {
          const open = detailsTr.dataset.open === '1';
          setOpen(!open);
        };

        const trendPts = (r.trend === null || r.trend === undefined) ? '–' : ((r.trend > 0 ? '+' : '') + r.trend.toFixed(0));
        const stabPts = (r.stab === null || r.stab === undefined) ? '–' : r.stab.toFixed(0);

        tr.innerHTML = `
          <td class="right">${idx + 1}</td>
          <td class="right small">${trendHtml(idx + 1, r.name)}</td>
          <td></td>
          <td class="right">${r.avg.toFixed(1)}</td>
          <td class="right col-forma" title="Forma: nowsza połowa okna vs starsza połowa (pkt/wojnę)">${trendPts}</td>
          <td class="right col-wahanie" title="Wahanie: max−min z okna (pkt)">${stabPts}</td>
          <td class="right">${r.warsCount < x ? `<span class="excl" title="Brak pełnej liczby wojen (${r.warsCount}/${x})">!</span>` : ``}${r.warsCount}/${x}</td>
        `;
        tr.classList.add('avg-row');
        if (idx === 0) tr.classList.add('podium-1');
        else if (idx === 1) tr.classList.add('podium-2');
        else if (idx === 2) tr.classList.add('podium-3');
        tr.setAttribute('role', 'button');
        tr.setAttribute('tabindex', '0');
        tr.setAttribute('aria-expanded', 'false');

        tr.addEventListener('click', (e) => {
          // Allow text selection without toggling if user is selecting.
          if (window.getSelection && String(window.getSelection()).length > 0) return;
          // Clicking mode icon/tooltip should not toggle war details.
          if (e.target && e.target.closest && e.target.closest('.w-mode-wrap')) return;
          toggle();
        });
        tr.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggle();
          }
        });

        // Nick
        tr.children[2].appendChild(nameSpan);

        // Restore expanded state for this player (if it was open before re-render).
        const openNamesArr = Array.isArray(window.__AVG_OPEN_NAMES__) ? window.__AVG_OPEN_NAMES__ : [];
        const shouldOpen = openNamesArr.includes(r.name);
        setOpen(shouldOpen);

        tbody.appendChild(tr);
        tbody.appendChild(detailsTr);
      });

      const btn = document.getElementById('rosterToggleBtn');
      if (rest.length > 0) {
        btn.style.display = '';
        btn.textContent = expanded ? 'Pokaż mniej' : 'Pokaż więcej';
        btn.title = `Pokaż ${rest.length} pozostałych`;
        btn.onclick = () => {
          expanded = !expanded;
          // Show/hide only the main rows. When revealing "more" rows we keep ALL detail rows collapsed
          // (user must click the small arrow to open details).
          const moreMainRows = document.querySelectorAll('#rosterTable tbody tr.more-row:not(.details-row)');
          for (const tr of moreMainRows) {
            if (!expanded) {
              tr.style.display = 'none';
              const detailsTr = tr.nextElementSibling;
              if (detailsTr && detailsTr.classList.contains('details-row')) {
                detailsTr.style.display = 'none';
                detailsTr.dataset.open = '0';
              }
              tr.setAttribute('aria-expanded', 'false');
            } else {
              tr.style.display = '';
              // Force-collapse details for newly revealed rows.
              const detailsTr = tr.nextElementSibling;
              if (detailsTr && detailsTr.classList.contains('details-row')) {
                detailsTr.style.display = 'none';
                detailsTr.dataset.open = '0';
              }
              tr.setAttribute('aria-expanded', 'false');
            }
          }
          btn.textContent = expanded ? 'Pokaż mniej' : 'Pokaż więcej';
        };
      } else {
        btn.style.display = 'none';
        btn.onclick = null;
      }
    };

    sel.onchange = render;
    render();
  }

  loadAll().catch(err => {
    console.error(err);
    document.getElementById('warsCount').textContent = 'Błąd ładowania danych.';
  });
</script>
</body>
</html>
